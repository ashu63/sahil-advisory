<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2440"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#dfc575"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="200" y1="40" x2="200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(200,168,78,0.15)" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M200 60 L310 110 L310 200 C310 265 260 310 200 340 C140 310 90 265 90 200 L90 110 Z" fill="url(#bgGrad)" stroke="url(#shieldGrad)" stroke-width="3"/>

  <!-- Inner shield highlight -->
  <path d="M200 80 L295 123 L295 200 C295 256 252 296 200 322 C148 296 105 256 105 200 L105 123 Z" fill="none" stroke="rgba(200,168,78,0.2)" stroke-width="1"/>

  <!-- Letter S -->
  <text x="155" y="240" font-family="Georgia, serif" font-size="140" font-weight="700" font-style="italic" fill="url(#goldGrad)">S</text>

  <!-- Letter A overlapping -->
  <text x="210" y="250" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#ffffff" opacity="0.95">A</text>

  <!-- Decorative line under letters -->
  <line x1="140" y1="268" x2="270" y2="268" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Company name arc text - simplified as straight text below shield -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="8" fill="#c8a84e">SAHIL</text>

  <!-- ADVISORY text -->
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="5" fill="rgba(255,255,255,0.7)">ADVISORY</text>

  <!-- Small tagline -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="400" letter-spacing="3" fill="rgba(255,255,255,0.4)">ADVISE · ANALYZE · ACHIEVE</text>
</svg>
